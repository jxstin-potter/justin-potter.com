    <script type="text/javascript">
      // GitHub Pages SPA redirect handler (query-string based).
      // 404.html sends requested path as ?p=/requested/path, which we restore.
      (function restoreSpaPath() {
        var search = window.location.search || "";
        if (!search.startsWith("?p=")) return;
        var encodedPath = search.substring(3);
        if (!encodedPath) return;
        var decodedPath = decodeURIComponent(encodedPath);
        window.history.replaceState(null, "", decodedPath);
      })();
    </script>
